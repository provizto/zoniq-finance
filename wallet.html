<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZoniqFi - Custom Wallet Modal</title>
    <style>
        /* ==========================================================================
           1. CSS STYLING (Dasbor & Tombol Utama)
           ========================================================================== */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .connect-trigger-btn {
            background: linear-gradient(135deg, #0052FF 0%, #003db3 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.3);
        }

        .connect-trigger-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 82, 255, 0.5);
        }

        /* ==========================================================================
           2. CSS POP-UP MODAL (Kustom)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #121824;
            border: 1px solid #1f293d;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            color: #8a9fc2;
            font-size: 24px;
            cursor: pointer;
        }

        /* Opsi Pilihan Wallet di Dalam Pop-up */
        .wallet-option-btn {
            width: 100%;
            background-color: #1c2538;
            border: 1px solid #28354f;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        .wallet-option-btn:hover {
            background-color: #24304a;
            border-color: #0052FF;
            transform: translateX(2px);
        }

        /* Tag penanda khusus untuk Smart Wallet */
        .badge-smart {
            background-color: #0052FF;
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wallet-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- Tombol Pemicu Utama di Halaman Aplikasi -->
    <button id="main-connect-btn" class="connect-trigger-btn">Connect Wallet</button>

    <!-- STRUCTURE POP-UP MODAL MULTI-WALLET -->
    <div id="wallet-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Hubungkan Dompet</div>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            
            <!-- Metode 1: Coinbase Smart Wallet (Rekomendasi Utama Base L2) -->
            <button id="choose-smart-wallet" class="wallet-option-btn">
                <div class="wallet-info">
                    <img class="wallet-icon" src="https://githubusercontent.com" alt="Coinbase">
                    <span>Coinbase Smart Wallet</span>
                </div>
                <span class="badge-smart">Populer / Passkey</span>
            </button>

            <!-- Metode 2: Browser Wallets (MetaMask, Rabby, dll) -->
            <button id="choose-injected-wallet" class="wallet-option-btn">
                <div class="wallet-info">
                    <img class="wallet-icon" src="https://githubusercontent.com" alt="MetaMask">
                    <span>MetaMask & Browser Wallet</span>
                </div>
                <span>&rarr;</span>
            </button>

            <!-- Metode 3: Mobile Wallets (WalletConnect QR Code) -->
            <button id="choose-wallet-connect" class="wallet-option-btn">
                <div class="wallet-info">
                    <img class="wallet-icon" src="https://githubusercontent.com" alt="WalletConnect">
                    <span>WalletConnect (Scan QR)</span>
                </div>
                <span>&rarr;</span>
            </button>
        </div>
    </div>

    <!-- ==========================================================================
       3. JAVASCRIPT INTEGRATION (Logika Buka Pop-Up & Web3 Core)
       ========================================================================== */ -->
    <script type="module">
        import { createAppKit } from 'https://esm.sh'
        import { base } from 'https://esm.sh/networks'

        const projectId = 'YOUR_WALLETCONNECT_PROJECT_ID'; // Dapatkan gratis di ://walletconnect.com

        // Inisialisasi mesin Web3 (AppKit) di latar belakang
        const appkit = createAppKit({
            adapters: [],
            networks: [base],
            projectId
        });

        // Elemen DOM Pop-up kustom kita
        const modal = document.getElementById('wallet-modal');
        const triggerBtn = document.getElementById('main-connect-btn');
        const closeBtn = document.getElementById('close-modal-btn');

        // Fungsi Buka & Tutup Pop-Up Kustom
        triggerBtn.addEventListener('click', () => {
            // Jika sudah terhubung, klik tombol akan langsung membuka dashboard profil wallet
            if (triggerBtn.getAttribute('data-connected') === 'true') {
                appkit.open({ view: 'Account' });
            } else {
                // Jika belum terhubung, munculkan Pop-Up kustom buatan kita
                modal.classList.add('active');
            }
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });

        /* ==========================================================================
           LOGIKA KLIK DI DALAM POP-UP (Menghubungkan ke SDK Dompet Masing-Masing)
           ========================================================================== */
        
        // 1. Opsi Coinbase Smart Wallet (Buka instan dengan preferensi Smart Wallet Base)
        document.getElementById('choose-smart-wallet').addEventListener('click', async () => {
            modal.classList.remove('active');
            await appkit.open({ view: 'Connect' }); // Membuka modul otentikasi Coinbase/Smart Wallet
        });

        // 2. Opsi Browser Wallet (MetaMask / Extension terdeteksi)
        document.getElementById('choose-injected-wallet').addEventListener('click', async () => {
            modal.classList.remove('active');
            await appkit.open({ view: 'AllWallets' });
        });

        // 3. Opsi WalletConnect (Langsung tembak ke tampilan QR Code)
        document.getElementById('choose-wallet-connect').addEventListener('click', async () => {
            modal.classList.remove('active');
            await appkit.open({ view: 'Connect' });
        });

        // Sinkronisasi status akun ke Tombol Pemicu Utama
        appkit.subscribeAccount(account => {
            if (account.isConnected) {
                const addr = account.address;
                triggerBtn.innerText = `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`;
                triggerBtn.setAttribute('data-connected', 'true');
                triggerBtn.style.background = '#1c2434';
            } else {
                triggerBtn.innerText = 'Connect Wallet';
                triggerBtn.setAttribute('data-connected', 'false');
                triggerBtn.style.background = 'linear-gradient(135deg, #0052FF 0%, #003db3 100%)';
            }
        });
    </script>
</body>
</html>
