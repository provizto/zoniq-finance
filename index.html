<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq Finance - Next-Gen DeFi-RWA Aggregator</title>
    <style>
        /* CSS yang diringkas untuk efisiensi */
        :root { --bg-color: #0f172a; --text-color: #cbd5e1; --title-color: #f8fafc; --accent-color: #38bdf8; --card-bg: #1e293b; --border-color: #334155; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 50px; }
        .toggle-container { display: flex; justify-content: center; margin-bottom: 30px; }
        .switch { position: relative; display: inline-block; width: 140px; height: 40px; background-color: var(--card-bg); border-radius: 20px; cursor: pointer; }
        .switch-label { position: absolute; top: 0; width: 70px; height: 40px; line-height: 40px; text-align: center; font-weight: 700; z-index: 2; }
        .switch-handle { position: absolute; top: 2px; left: 2px; width: 66px; height: 34px; background-color: var(--accent-color); border-radius: 18px; z-index: 1; transition: transform 0.3s; }
        .switch.active-en .switch-handle { transform: translateX(68px); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .tokenomics-img { max-width: 100%; height: auto; border-radius: 12px; }
        .lang-section.hidden { display: none; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 20px; font-weight: bold; }
        .btn-primary { background-color: var(--accent-color); color: #000; }
        .btn-secondary { border: 1px solid var(--border-color); color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="toggle-container">
            <div id="langToggle" class="switch active-en" onclick="toggleLanguage()">
                <div class="switch-handle"></div>
                <span class="switch-label" style="left:0">ID</span>
                <span class="switch-label" style="right:0">EN</span>
            </div>
        </div>
        <h1>ZONIQ FINANCE ($ZNQ)</h1>
        <p id="hero-text">Next-Gen DeFi-RWA Aggregator</p>
        <a href="#" class="btn btn-primary">Launch App</a>
    </div>

    <div id="sect-id" class="lang-section hidden">
        <h2>Ringkasan</h2>
        <p>Protokol agregator DeFi-RWA berbiaya rendah di jaringan Base & Arbitrum...</p>
    </div>
    <div id="sect-en" class="lang-section">
        <h2>Executive Summary</h2>
        <p>Zoniq Finance ($ZNQ) is a cutting-edge decentralized finance (DeFi) aggregator...</p>
    </div>
</div>
<script>
    function toggleLanguage() {
        const toggle = document.getElementById('langToggle');
        const isEn = toggle.classList.toggle('active-en');
        document.getElementById('sect-id').classList.toggle('hidden', isEn);
        document.getElementById('sect-en').classList.toggle('hidden', !isEn);
    }
</script>
</body>
</html>
