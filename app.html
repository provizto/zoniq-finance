<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq Finance - App Dashboard</title>
    <style>
        /* --- CORE CONFIGURATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #03070d; /* Ultra Dark Background */
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        /* --- LANG SWITCHER FIXED BUTTON --- */
        .lang-switcher {
            position: fixed;
            top: 25px;
            right: 240px; /* Jarak aman di sebelah tombol dompet */
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: rgba(5, 11, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #a0aec0;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background-color: #00f2c3;
            color: #050b14;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 260px;
            background-color: #050b14;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .brand-logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00f2c3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            padding-left: 10px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item a {
            display: block;
            padding: 12px 15px;
            color: #a0aec0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .nav-item.active a, .nav-item a:hover {
            background: rgba(0, 242, 195, 0.1);
            color: #00f2c3;
        }

        /* --- MAIN DASHBOARD CONTAINER --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #0066ff, #00f2c3);
            color: #03070d;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 195, 0.2);
            transition: transform 0.2s ease;
        }

        .wallet-btn:hover {
            transform: translateY(-2px);
        }

        /* --- METRICS GRID --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: rgba(5, 11, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
        }

        .metric-card p {
            color: #a0aec0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .text-green { color: #00f2c3; }

        /* --- INTERACTION ZONE --- */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .action-card {
            background: rgba(5, 11, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 16px;
        }

        .action-card h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .input-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box-wrapper input {
            width: 100%;
            background-color: #03070d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
        }

        .input-box-wrapper input:focus {
            border-color: #00f2c3;
        }

        .token-badge {
            position: absolute;
            right: 15px;
            font-weight: 700;
            color: #00f2c3;
        }

        .action-btn {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: #00f2c3;
            color: #03070d;
            border-color: #00f2c3;
            font-weight: 700;
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 968px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
            .action-grid { grid-template-columns: 1fr; }
            .main-content { padding: 25px; }
            .lang-switcher { position: relative; top: auto; right: auto; margin: 20px auto 0 auto; width: fit-content; }
        }
    </style>
</head>
<body>

    <!-- TOMBOL PENGUBAH BAHASA -->
    <div class="lang-switcher">
        <button class="lang-btn active" id="btn-lang-id" onclick="switchLang('id')">ID</button>
        <button class="lang-btn" id="btn-lang-en" onclick="switchLang('en')">EN</button>
    </div>

    <!-- SISI KINI: MENU NAVIGASI APP -->
    <aside class="sidebar">
        <div class="brand-logo">ZONIQ FINANCE</div>
        <ul class="nav-links">
            <li class="nav-item active"><a href="#" id="menu-dash">Dashboard</a></li>
            <li class="nav-item"><a href="#" id="menu-stake">Staking Kolam</a></li>
            <li class="nav-item"><a href="#" id="menu-rwa">Agunan RWA</a></li>
            <li class="nav-item"><a href="#" id="menu-dao">Tata Kelola (DAO)</a></li>
        </ul>
    </aside>

    <!-- SISI KANAN: KONTEN UTAMA DASHBOARD -->
    <main class="main-content">
        <header class="app-header">
            <div>
                <h1 id="title-summary">Ringkasan Dasbor</h1>
            </div>
            <!-- Tombol Koneksi Web3 MetaMask -->
            <button class="wallet-btn" id="btn-connect">Hubungkan Dompet</button>
        </header>

        <!-- GRID STATISTIK UTAMA -->
        <section class="metrics-grid">
            <div class="metric-card">
                <p id="m-price">Harga $ZNQ</p>
                <h2>$0.0100</h2>
            </div>
            <div class="metric-card">
                <p id="m-tvl">Total Nilai Terkunci (TVL)</p>
                <h2 class="text-green">$1,245,000</h2>
            </div>
            <div class="metric-card">
                <p id="m-coll">Agunan RWA Anda</p>
                <h2>$0.00</h2>
            </div>
            <div class="metric-card">
                <p id="m-apy">Estimasi APY Staking</p>
                <h2 class="text-green">24.5%</h2>
            </div>
        </section>

        <!-- PANEL INTERAKSI FITUR -->
        <section class="action-grid">
            <!-- PANEL STAKING -->
            <div class="action-card">
                <h3 id="card-t-stake">Kunci Token $ZNQ</h3>
                <div class="input-group">
                    <label id="lbl-stake">Jumlah untuk di-Staking</label>
                    <div class="input-box-wrapper">
                        <input type="number" placeholder="0.0">
                        <span class="token-badge">ZNQ</span>
                    </div>
                </div>
                <button class="action-btn" id="btn-act-stake">Mulai Staking</button>
            </div>

            <!-- PANEL INTEGRASI AGUNAN SILANG RWA -->
            <div class="action-card">
                <h3 id="card-t-rwa">Ajukan Jaminan RWA</h3>
                <div class="input-group">
                    <label id="lbl-rwa">Nilai Tokenisasi Aset Fisik</label>
                    <div class="input-box-wrapper">
                        <input type="number" placeholder="0.0">
                        <span class="token-badge">USD</span>
                    </div>
                </div>
                <button class="action-btn" id="btn-act-rwa">Kunci sebagai Agunan</button>
            </div>
        </section>
    </main>

    <!-- LOGIKA JAVASCRIPT MULTIBAHASA & METAMASK -->
    <script>
        // 1. KAMUS BAHASA DASHBOARD
        const appTranslations = {
            id: {
                menuDash: "Dashboard",
                menuStake: "Staking Kolam",
                menuRwa: "Agunan RWA",
                menuDao: "Tata Kelola (DAO)",
                titleSummary: "Ringkasan Dasbor",
                btnConnect: "Hubungkan Dompet",
                btnConnecting: "Menghubungkan...",
                mPrice: "Harga $ZNQ",
                mTvl: "Total Nilai Terkunci (TVL)",
                mColl: "Agunan RWA Anda",
                mApy: "Estimasi APY Staking",
                cardTStake: "Kunci Token $ZNQ",
                lblStake: "Jumlah untuk di-Staking",
                btnActStake: "Mulai Staking",
                cardTRwa: "Ajukan Jaminan RWA",
                lblRwa: "Nilai Tokenisasi Aset Fisik",
                btnActRwa: "Kunci sebagai Agunan",
                metaError: "MetaMask tidak terdeteksi! Silakan instal ekstensi MetaMask."
            },
            en: {
                menuDash: "Dashboard",
                menuStake: "Staking Pools",
                menuRwa: "RWA Collateral",
                menuDao: "Governance (DAO)",
                titleSummary: "Dashboard Summary",
                btnConnect: "Connect Wallet",
                btnConnecting: "Connecting...",
                mPrice: "$ZNQ Price",
                mTvl: "Total Value Locked (TVL)",
                mColl: "Your RWA Collateral",
                mApy: "Estimated Staking APY",
                cardTStake: "Lock $ZNQ Tokens",
                lblStake: "Amount to Stake",
                btnActStake: "Start Staking",
                cardTRwa: "Deposit RWA Collateral",
                lblRwa: "Tokenized Asset Value",
                btnActRwa: "Lock as Collateral",
                metaError: "MetaMask not detected! Please install MetaMask extension."
            }
        };

        let currentLang = 'id';
        let isConnected = false;
        let walletAddress = "";

        // 2. FUNGSI PENGUBAH BAHASA
        function switchLang(lang) {
            currentLang = lang;
            
            document.getElementById('menu-dash').innerText = appTranslations[lang].menuDash;
            document.getElementById('menu-stake').innerText = appTranslations[lang].menuStake;
            document.getElementById('menu-rwa').innerText = appTranslations[lang].menuRwa;
            document.getElementById('menu-dao').innerText = appTranslations[lang].menuDao;
            document.getElementById('title-summary').innerText = appTranslations[lang].titleSummary;
            document.getElementById('m-price').innerText = appTranslations[lang].mPrice;
            document.getElementById('m-tvl').innerText = appTranslations[lang].mTvl;
            document.getElementById('m-coll').innerText = appTranslations[lang].mColl;
            document.getElementById('m-apy').innerText = appTranslations[lang].mApy;
            document.getElementById('card-t-stake').innerText = appTranslations[lang].cardTStake;
            document.getElementById('lbl-stake').innerText = appTranslations[lang].lblStake;
            document.getElementById('btn-act-stake').innerText = appTranslations[lang].btnActStake;
            document.getElementById('card-t-rwa').innerText = appTranslations[lang].cardTRwa;
            document.getElementById('lbl-rwa').innerText = appTranslations[lang].lblRwa;
            document.getElementById('btn-act-rwa').innerText = appTranslations[lang].btnActRwa;

            // Update status teks tombol dompet jika tidak sedang terkoneksi
            if (!isConnected) {
                document.getElementById('btn-connect').innerText = appTranslations[lang].btnConnect;
            }

            // Ganti visual aktif pada tombol bahasa
            document.getElementById('btn-lang-id').classList.remove('active');
            document.getElementById('btn-lang-en').classList.remove('active');
            if (lang === 'id') document.getElementById('btn-lang-id').classList.add('active');
            if (lang === 'en') document.getElementById('btn-lang-en').classList.add('active');
        }

        // 3. LOGIKA INTERAKSI METAMASK
        const walletBtn = document.getElementById('btn-connect');

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    walletBtn.innerText = appTranslations[currentLang].btnConnecting;
                    
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    walletAddress = accounts[0];
                    isConnected = true;
                    
                    // Format alamat dompet agar ringkas (Contoh: 0x1234...abcd)
                    const formatted = walletAddress.substring(0, 6) + "..." + walletAddress.substring(walletAddress.length - 4);
                    
                    walletBtn.innerText = formatted;
                    walletBtn.style.background = "#00f2c3";
                    walletBtn.style.color = "#03070d";
                } catch (error) {
                    console.error("Koneksi dibatalkan:", error);
                    isConnected = false;
                    walletBtn.innerText = appTranslations[currentLang].btnConnect;
                }
            } else {
                alert(appTranslations[currentLang].metaError);
                walletBtn.innerText = appTranslations[currentLang].btnConnect;
            }
        }

        walletBtn.addEventListener('click', connectWallet);
    </script>
    
    <!-- 1. Muat SDK Widget Gabungan dari CDN Resmi -->
<script src="https://unpkg.com"></script>

<script>
  window.addEventListener('DOMContentLoaded', async () => {
    // 2. Inisialisasi Konteks Gabungan (Web3 Wallets + Web2 Auth)
    const dynamicContext = window.DynamicLabs.initialize({
      environmentId: 'MASUKKAN_ENVIRONMENT_ID_DYNAMIC_ANDA_DI_SINI',
      settings: {
        // Menampilkan pilihan dompet kripto & opsi email sekaligus dalam satu layar
        walletConnectors: [ window.DynamicLabs.EthereumWalletConnectors ],
        initialAuthenticationByEmail: true
      }
    });

    const walletBtn = document.getElementById('btn-connect');

    // 3. Logika Mengubah Teks Tombol Berdasarkan Status Hubung
    function checkConnection() {
        const primaryWallet = dynamicContext.walletManager.primaryWallet;
        if (primaryWallet) {
            const addr = primaryWallet.address;
            walletBtn.innerText = addr.substring(0, 6) + "..." + addr.substring(addr.length - 4);
            walletBtn.style.background = "#00f2c3"; // Warna hijau toska saat aktif
            walletBtn.style.color = "#03070d";
        } else {
            // Menyesuaikan teks dengan bahasa web yang sedang aktif (ID/EN)
            walletBtn.innerText = typeof currentLang !== 'undefined' && currentLang === 'en' ? "Connect Wallet" : "Hubungkan Dompet";
            walletBtn.style.background = "linear-gradient(135deg, #0066ff, #00f2c3)";
            walletBtn.style.color = "#03070d";
        }
    }

    // 4. Picu Jendela Login All-in-One Saat Tombol Diklik
    walletBtn.addEventListener('click', () => {
      if (!dynamicContext.walletManager.primaryWallet) {
          dynamicContext.auth.showAuthFlow();
      } else {
          // Jika diklik saat sudah terhubung, akan membuka menu log out / profil
          dynamicContext.ui.showUserMenu();
      }
    });

    // 5. Pantau Perubahan Status Koneksi Dompet secara Real-Time
    dynamicContext.events.on('authSuccess', () => {
        checkConnection();
    });
    
    dynamicContext.events.on('logout', () => {
        checkConnection();
    });

    // Jalankan pengecekan otomatis saat halaman pertama kali dimuat
    setTimeout(checkConnection, 1000);
  });
</script>

</body>
</html>
