<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq Finance | Program Referral</title>
    
    <link rel="stylesheet" href="css/referral.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" defer></script>
</head>
<body>

    <div class="referral-box">
        <div class="brand-header">
            <h2>ZONIQ<span>FINANCE</span></h2>
        </div>
        
        <div class="content-section">
            <h3>Bagikan Link & Dapatkan Komisi</h3>
            <p>Undang teman Anda untuk bergabung dan dapatkan bonus persentase langsung ke wallet Anda.</p>
            
            <div id="wallet-status" class="status-card">
                Status: <span id="connection-text">Wallet Belum Terhubung</span>
            </div>

            <div class="input-group">
                <input type="text" id="referral-link" value="https://zoniqfinance.com/referral?ref=0x000..." readonly>
                <button id="btn-copy" onclick="copyLink()">Salin</button>
            </div>
            
            <button id="btn-connect" class="main-btn">Hubungkan Wallet</button>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <h4>Total Teman</h4>
                <p id="total-ref">0</p>
            </div>
            <div class="stat-item">
                <h4>Estimasi Bonus</h4>
                <p id="total-rewards">0.00 USDT</p>
            </div>
        </div>
    </div>

    <script src="js/referral.js"></script>
</body>
</html>
