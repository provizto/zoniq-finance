<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZoniqFi ($ZNF) - Custom Lang Selector</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #151a24;
            border: 1px solid #232d3f;
            border-radius: 12px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* --- STYLE KUSTOM TOMBOL BAHASA (PERSI KAYA GAMBAR) --- */
        .custom-dropdown {
            position: relative;
            display: inline-block;
        }

        /* Tombol Utama */
        .dropdown-btn {
            background-color: #1a2230;
            color: #ffffff;
            border: 1px solid #232d3f;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .dropdown-btn:hover {
            border-color: #00ffcc;
        }

        /* Ikon Bola Bumi Sederhana Menggunakan CSS */
        .icon-globe {
            width: 14px;
            height: 14px;
            border: 1.5px solid #00ffcc;
            border-radius: 50%;
            position: relative;
            display: inline-block;
        }
        .icon-globe::before {
            content: '';
            position: absolute;
            top: 0; left: 3px;
            width: 6px; height: 11px;
            border-left: 1.5px solid #00ffcc;
            border-right: 1.5px solid #00ffcc;
            border-radius: 50%;
        }

        /* Panah Bawah (Chevron) */
        .icon-arrow {
            width: 0; 
            height: 0; 
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid #ffffff;
            margin-left: 2px;
            transition: transform 0.2s;
        }

        /* Menu Pilihan yang Muncul Saat Diklik */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #151a24;
            min-width: 100%;
            border: 1px solid #232d3f;
            border-radius: 8px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 1;
            margin-top: 5px;
            overflow: hidden;
        }

        /* Item Menu Pilihan */
        .dropdown-content div {
            color: #8892b0;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-content div:hover {
            background-color: #1a2230;
            color: #ffffff;
        }

        /* Tampilan Item yang Sedang Aktif / Terpilih */
        .dropdown-content div.active {
            background-color: #0077ff; /* Warna biru cerah mirip gambar Anda */
            color: #ffffff;
        }

        /* Class Pembuka Menu via JavaScript */
        .show {
            display: block;
        }
        .rotate-arrow {
            transform: rotate(180deg);
        }

        /* Style Tombol Connect Wallet */
        .btn-connect {
            background: linear-gradient(45deg, #00ffcc, #00b395);
            color: #0b0e14;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 700; font-size: 18px;">ZoniqFi</div>
        
        <div class="header-controls">
            <!-- KOMPONEN TOMBOL BAHASA KUSTOM -->
            <div class="custom-dropdown">
                <button class="dropdown-btn" onclick="toggleDropdown()">
                    <span class="icon-globe"></span>
                    <span id="currentLangTxt">EN</span>
                    <span class="icon-arrow" id="arrowIcon"></span>
                </button>
                <div class="dropdown-content" id="langMenu">
                    <div class="active" onclick="changeLanguage('en')"><span class="icon-globe"></span> EN</div>
                    <div onclick="changeLanguage('id')"><span class="icon-globe"></span> ID</div>
                </div>
            </div>

            <!-- TOMBOL CONNECT WALLET STATIS -->
            <button class="btn-connect" onclick="connectWalletMock()">Connect Wallet</button>
        </div>
    </header>

    <script>
        // Fungsi Membuka dan Menutup Dropdown Menu Bahasa
        function toggleDropdown() {
            document.getElementById("langMenu").classList.toggle("show");
            document.getElementById("arrowIcon").classList.toggle("rotate-arrow");
        }

        // Fungsi Mengubah Pilihan Bahasa Digital
        function changeLanguage(lang) {
            // Update teks tombol utama
            document.getElementById("currentLangTxt").innerText = lang.toUpperCase();
            
            // Atur highlight biru aktif pada menu
            const items = document.querySelectorAll(".dropdown-content div");
            items.forEach(item => item.classList.remove("active"));
            
            if(lang === 'en') {
                items[0].classList.add("active");
            } else {
                items[1].classList.add("active");
            }
            
            // Tutup menu kembali
            toggleDropdown();
            
            // (Opsional) Integrasikan fungsi ini dengan kamus bahasa yang sudah kita buat sebelumnya
            console.log("Bahasa diubah ke: " + lang);
        }

        // Menutup dropdown otomatis jika pengguna mengklik area luar menu
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn') && !event.target.matches('.icon-globe') && !event.target.matches('#currentLangTxt') && !event.target.matches('.icon-arrow')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                const arrow = document.getElementById("arrowIcon");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) {
                        dropdowns[i].classList.remove('show');
                        arrow.classList.remove('rotate-arrow');
                    }
                }
            }
        }

        // Simulasi Notifikasi Fungsi Tombol Connect Wallet
        function connectWalletMock() {
            alert("Tombol ini belum terhubung ke blockchain asli. Tugas CTO Anda nanti adalah menghubungkan tombol ini dengan library Web3 (seperti RainbowKit atau MetaMask SDK) agar bisa memunculkan dompet asli.");
        }
    </script>
</body>
</html>
